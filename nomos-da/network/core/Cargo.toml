[package]
name = "nomos-da-network-core"
version = "0.1.0"
edition = "2021"
license = { workspace = true }

[dependencies]
either = "1.13.0"
fixed = "1"
futures = "0.3"
indexmap = "2.2"
kzgrs-backend = { path = "../../kzgrs-backend" }
libp2p = { version = "0.55", features = ["macros", "tokio", "quic"] }
libp2p-stream = "0.3.0-alpha"
log = "0.4"
nomos-core = { path = "../../../nomos-core/chain-defs" }
nomos-da-messages = { path = "../messages" }
rand = "0.8"
rand_chacha = "0.3"
serde = "1.0"
subnetworks-assignations = { path = "../subnetworks-assignations" }
thiserror = "1.0"
tokio = { version = "1" }
tokio-stream = "0.1"
tracing = "0.1"
tracing-subscriber = "0.3.18"
void = "1.0.2"

[dev-dependencies]
blake2 = "0.10"
kzgrs-backend = { path = "../../kzgrs-backend", features = ["testutils"] }
libp2p = { version = "0.55", features = ["ed25519", "ping", "macros", "quic", "tcp", "yamux", "noise"] }
libp2p-swarm-test = "0.5.0"
tokio = { version = "1", features = ["macros", "rt-multi-thread", "time"] }
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
